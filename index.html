    <!-- Preload homepage hero image — LCP element. Responsive srcset picks the
         mobile variant on small screens, desktop on large. -->
    <link
      rel="preload"
      as="image"
      href="/Busy-Shop-aisle.webp"
      imagesrcset="/Busy-Shop-aisle-sm.webp 480w, /Busy-Shop-aisle-mobile.webp 1024w, /Busy-Shop-aisle.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />

    <!-- Self-hosted Inter font — preload the latin subset so the browser starts
         fetching it before it parses the CSS @font-face rule. The latin-ext
         subset loads on-demand via unicode-range if accented chars are needed. -->
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
