name: Weekly blog rebuild

# Triggers a Render deploy every Wednesday at 11pm Pacific (06:00 UTC Thu
# during PDT, 07:00 UTC Thu during PST). The deploy regenerates the sitemap
# so any blog posts whose `date` has just passed get crawled by Google.
#
# Layer 1 (runtime date filter in posts.ts) reveals new posts on the live
# site automatically — this cron only exists to refresh the sitemap.
#
# Posts dated Wednesday will appear in the sitemap on the same Wed→Thu UTC
# rollover that this cron fires after.

on:
  schedule:
    - cron: '0 6 * * 4'   # 06:00 UTC Thursday = Wed 11pm PDT / 10pm PST
  workflow_dispatch:       # also allow manual trigger from the GitHub UI

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          response=$(curl -sS -w "\nHTTP %{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "$response"
          echo "$response" | grep -q "HTTP 20" || exit 1
